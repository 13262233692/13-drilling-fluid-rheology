server:
  port: 8080

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: true

modbus:
  viscometer:
    host: 127.0.0.1
    port: 502
    unit-id: 1
    poll-interval: 500
  densitometer:
    host: 127.0.0.1
    port: 503
    unit-id: 2
    poll-interval: 500

filter:
  sliding-window-size: 10

websocket:
  push-interval: 200

arima:
  p: 3
  d: 1
  q: 1

fracture:
  pressure:
    threshold: 1.85

risk:
  anomaly:
    threshold: 0.8
  poll-interval: 30000
